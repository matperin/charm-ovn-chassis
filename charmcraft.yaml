type: charm

parts:
  charm:
    source: src/
    plugin: reactive
    reactive-charm-build-arguments:
      - --binary-wheels-from-source
      - --use-lock-file-branches
      - -v
    build-packages:
      - git
      - python3-dev
      - libffi-dev
      - libssl-dev
      - rustc-1.85
      - cargo-1.85
    build-snaps:
      - charm
    build-environment:
      - CHARM_INTERFACES_DIR: $CRAFT_PROJECT_DIR/interfaces/
      - CHARM_LAYERS_DIR: $CRAFT_PROJECT_DIR/layers/
      - MAKEFLAGS: -j$(nproc)
      - CARGO_HTTP_MULTIPLEXING: "false"
bases:
  - build-on:
      - name: ubuntu
        channel: "22.04"
        architectures: [amd64]
    run-on:
      - name: ubuntu
        channel: "22.04"
        architectures: [amd64]
  - build-on:
      - name: ubuntu
        channel: "22.04"
        architectures: [s390x]
    run-on:
      - name: ubuntu
        channel: "22.04"
        architectures: [s390x]
  - build-on:
      - name: ubuntu
        channel: "22.04"
        architectures: [ppc64el]
    run-on:
      - name: ubuntu
        channel: "22.04"
        architectures: [ppc64el]
  - build-on:
      - name: ubuntu
        channel: "22.04"
        architectures: [arm64]
    run-on:
      - name: ubuntu
        channel: "22.04"
        architectures: [arm64]
  - build-on:
      - name: ubuntu
        channel: "23.10"
        architectures: [amd64]
    run-on:
      - name: ubuntu
        channel: "23.10"
        architectures: [amd64]
  - build-on:
      - name: ubuntu
        channel: "23.10"
        architectures: [s390x]
    run-on:
      - name: ubuntu
        channel: "23.10"
        architectures: [s390x]
  - build-on:
      - name: ubuntu
        channel: "23.10"
        architectures: [ppc64el]
    run-on:
      - name: ubuntu
        channel: "23.10"
        architectures: [ppc64el]
  - build-on:
      - name: ubuntu
        channel: "23.10"
        architectures: [arm64]
    run-on:
      - name: ubuntu
        channel: "23.10"
        architectures: [arm64]
